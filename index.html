<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Finder</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --surface2: #f7f9ff;
    --border: #e2e8f8;
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --primary-dark: #1d4ed8;
    --accent: #06b6d4;
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 3px rgba(37,99,235,.08);
    --shadow: 0 4px 20px rgba(37,99,235,.10);
  }
  body { font-family: "IBM Plex Sans Thai", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* TOPBAR */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 12px rgba(37,99,235,.3); }
  .brand-text h1 { font-size: 16px; font-weight: 700; color: var(--primary); }
  .brand-text p { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .icon-btn { width: 36px; height: 36px; border: none; background: var(--surface2); border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 16px; transition: all .2s; position: relative; }
  .icon-btn:hover { background: var(--primary-light); color: var(--primary); }
  .badge { position: absolute; top: -3px; right: -3px; width: 16px; height: 16px; background: #ef4444; border-radius: 50%; font-size: 9px; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 2px solid white; }
  .avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; cursor: pointer; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }

  /* FILTER BAR */
  .filter-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
  /* Row wrapper for the 3 dropdowns — used on mobile/tablet */
  .filter-dropdowns-row { display: contents; }
  .select-wrap { position: relative; }
  .select-wrap select { appearance: none; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 34px 9px 12px; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; min-width: 130px; transition: all .2s; outline: none; }
  .select-wrap select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  .select-wrap::after { content: "▾"; position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; pointer-events: none; }
  .search-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
  .search-group label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
  .search-row { display: flex; gap: 8px; }
  .search-input-wrap { position: relative; flex: 1; }
  .search-input-wrap input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px 9px 36px; font-family: inherit; font-size: 14px; color: var(--text); outline: none; transition: all .2s; }
  .search-input-wrap input::placeholder { color: var(--text3); }
  .search-input-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; }
  .btn { padding: 9px 18px; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: white; box-shadow: 0 2px 8px rgba(37,99,235,.3); }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1.5px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-sm { padding: 7px 13px; font-size: 13px; }

  /* MAIN */
  .main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .result-title { display: flex; align-items: center; gap: 10px; }
  .result-title h2 { font-size: 17px; font-weight: 700; }
  .result-count { background: var(--primary-light); color: var(--primary); padding: 3px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .result-actions { display: flex; gap: 8px; }
  .btn-excel { background: #f0fdf4; color: #16a34a; border: 1.5px solid #bbf7d0; }
  .btn-excel:hover { background: #dcfce7; }

  /* TABLE */
  .table-wrap { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: linear-gradient(135deg, #f1f5ff, #e8efff); border-bottom: 2px solid var(--border); }
  th { padding: 13px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--primary); }
  th .sort-icon { margin-left: 3px; opacity: .4; font-size: 10px; }
  td { padding: 12px 16px; font-size: 14px; color: var(--text); border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr { transition: background .12s; cursor: pointer; }
  tbody tr:hover { background: #f0f5ff; }
  tbody tr:last-child td { border-bottom: none; }
  .item-no { font-size: 13px; font-weight: 600; color: var(--primary); background: var(--primary-light); padding: 3px 9px; border-radius: 6px; display: inline-block; white-space: nowrap; }
  .desc-cell { max-width: 300px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .tag-active { background: #f0fdf4; color: #15803d; }
  .tag-disc { background: #fef2f2; color: #dc2626; }
  .tag-pack { background: #eff6ff; color: #2563eb; }
  .tag-comp { background: #fdf4ff; color: #9333ea; }
  .tag-avgsale { background: #fefce8; color: #854d0e; }
  .tag-zero { background: #f1f5f9; color: #64748b; }

  /* Detail pill button */
  .detail-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .detail-pill:hover { background: var(--primary-light); color: var(--primary); border-color: #c7d5ff; }

  /* PAGINATION */
  .pagination-wrap { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-top: 1px solid var(--border); background: var(--surface2); flex-wrap: wrap; gap: 10px; }
  .pagination { display: flex; gap: 4px; align-items: center; }
  .page-btn { width: 32px; height: 32px; border: 1.5px solid var(--border); background: var(--surface); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; }
  .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 2px 8px rgba(37,99,235,.3); }
  .page-btn.dots { border: none; background: transparent; cursor: default; }
  .page-btn:disabled { opacity: .4; cursor: not-allowed; }
  .page-info { font-size: 13px; color: var(--text3); display: flex; align-items: center; gap: 8px; }
  .per-page select { appearance: none; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px 22px 5px 10px; font-family: inherit; font-size: 13px; color: var(--text); cursor: pointer; outline: none; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state .icon { font-size: 52px; margin-bottom: 14px; opacity: .6; }
  .empty-state h3 { font-size: 17px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
  .empty-state p { font-size: 14px; color: var(--text3); }

  /* MODAL / DRAWER */
  .overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
  .overlay.open { display: flex; }
  @media (min-width: 641px) { .overlay { align-items: center; } }
  .drawer { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 -20px 60px rgba(15,23,42,.2); animation: slideUp .25s ease; position: relative; }
  @media (min-width: 641px) { .drawer { border-radius: var(--radius); animation: fadeZoom .2s ease; } }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeZoom { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .drawer-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border: none; background: var(--surface2); border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all .15s; }
  .drawer-close:hover { background: #fee2e2; color: #dc2626; }
  .drawer-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; padding-right: 32px; }
  .drawer-icon { width: 52px; height: 52px; background: var(--primary-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .drawer-title h3 { font-size: 17px; font-weight: 700; line-height: 1.3; color: var(--text); }
  .drawer-title .item-no-big { font-size: 13px; color: var(--primary); font-weight: 600; margin-top: 4px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
  .detail-card .dc-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .detail-card .dc-value { font-size: 14px; font-weight: 600; color: var(--text); }
  .detail-card .dc-value .tag { font-size: 13px; padding: 4px 12px; }
  .detail-divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* CARD LIST (mobile) */
  .card-list { display: none; gap: 10px; flex-direction: column; }
  .product-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 14px 14px 18px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
  .product-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, var(--primary), var(--accent)); }
  .product-card:hover { border-color: #c7d5ff; box-shadow: var(--shadow); transform: translateX(2px); }
  .card-body { flex: 1; min-width: 0; }
  .card-item-no { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 3px; }
  .card-desc { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .card-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  tbody tr { animation: fadeUp .2s ease both; }
  .product-card { animation: fadeUp .2s ease both; }

  /* RESPONSIVE */
  /* ── Mobile ≤640px ── */
  @media (max-width: 640px) {
    .topbar { padding: 0 14px; height: 56px; }
    .brand-text p { display: none; }
    .filter-bar {
      flex-direction: column;
      align-items: stretch;
      padding: 12px 14px;
      gap: 10px;
    }
    /* 3 dropdowns side-by-side */
    .filter-dropdowns-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      width: 100%;
    }
    .filter-dropdowns-row .filter-group { width: 100%; }
    .filter-dropdowns-row .select-wrap select { min-width: unset; width: 100%; font-size: 13px; padding: 8px 26px 8px 10px; }
    /* Search group full width below */
    .search-group { width: 100%; min-width: unset; }
    .main { padding: 12px 14px; }
    .table-wrap { display: none; }
    .card-list { display: flex; }
  }
  /* ── Tablet 641–960px ── */
  @media (min-width: 641px) and (max-width: 960px) {
    .filter-bar {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    /* 3 dropdowns side-by-side */
    .filter-dropdowns-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    .filter-dropdowns-row .filter-group { width: 100%; }
    .filter-dropdowns-row .select-wrap select { min-width: unset; width: 100%; }
    /* Search group full width below */
    .search-group { width: 100%; min-width: unset; }
    th.col-status, td.col-status, th.col-type, td.col-type { display: none; }
  }
  .bg-mesh { position: fixed; inset: 0; z-index: -1; pointer-events: none; background: radial-gradient(ellipse 70% 60% at 10% 10%, rgba(37,99,235,.05), transparent), radial-gradient(ellipse 60% 50% at 90% 90%, rgba(6,182,212,.05), transparent); }
</style>
</head>
<body>
<div class="bg-mesh"></div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="brand">
    <div class="brand-icon">🔍</div>
    <div class="brand-text">
      <h1>Product Finder</h1>
      <p>ค้นหาข้อมูลสินค้าได้รวดเร็ว</p>
    </div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn">🔔<span class="badge">3</span></button>
    <div class="avatar">A</div>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-dropdowns-row">
    <div class="filter-group">
      <label>Dept No.</label>
      <div class="select-wrap">
        <select id="deptFilter" onchange="applyFilters()">
          <option value="">— ทุก Dept —</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="5">5</option>
        </select>
      </div>
    </div>
    <div class="filter-group">
      <label>Class</label>
      <div class="select-wrap">
        <select id="classFilter" onchange="applyFilters()">
          <option value="">— ทุก Class —</option>
        </select>
      </div>
    </div>
    <div class="filter-group">
      <label>Item Status</label>
      <div class="select-wrap">
        <select id="statusFilter" onchange="applyFilters()">
          <option value="">— ทุก Status —</option>
          <option value="Active">Active</option>
          <option value="Discontinued">Discontinued</option>
        </select>
      </div>
    </div>
  </div>
  <div class="search-group">
    <label>ค้นหาสินค้า</label>
    <div class="search-row">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="ค้นหาชื่อสินค้า หรือ Item No ..." oninput="applyFilters()" />
      </div>
      <button class="btn btn-primary" onclick="applyFilters()">ค้นหา</button>
      <button class="btn btn-ghost" onclick="clearFilters()">ล้างค่า</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div class="result-header">
    <div class="result-title">
      <h2>ผลการค้นหา</h2>
      <span class="result-count" id="resultCount">0 รายการ</span>
    </div>
    <div class="result-actions">
      <button class="btn btn-excel btn-sm" onclick="exportCSV()">📊 ส่งออก Excel</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap" id="tableWrap">
    <table>
      <thead>
        <tr>
          <th style="width:44px">#</th>
          <th onclick="sortBy('itemNo')">Item No <span class="sort-icon" id="sort-itemNo">↕</span></th>
          <th onclick="sortBy('desc')">Description <span class="sort-icon" id="sort-desc">↕</span></th>
          <th class="col-status" onclick="sortBy('status')">Item Status <span class="sort-icon" id="sort-status">↕</span></th>
          <th class="col-type" onclick="sortBy('type')">TYPE <span class="sort-icon" id="sort-type">↕</span></th>
          <th style="width:110px">รายละเอียด</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">🔎</div>
      <h3>ไม่พบสินค้าที่ค้นหา</h3>
      <p>ลองเปลี่ยนเงื่อนไขการค้นหาใหม่</p>
    </div>
    <div class="pagination-wrap" id="paginationWrap">
      <div class="page-info">
        <span id="pageInfo"></span>
        <span class="per-page">แสดง&nbsp;
          <select onchange="changePerPage(this.value)">
            <option value="10" selected>10 รายการ</option>
            <option value="20">20 รายการ</option>
            <option value="50">50 รายการ</option>
          </select>
        </span>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- CARD LIST mobile -->
  <div class="card-list" id="cardList"></div>
</main>

<!-- DETAIL DRAWER/MODAL -->
<div class="overlay" id="overlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer">
    <button class="drawer-close" onclick="closeDrawerBtn()">✕</button>
    <div class="drawer-header">
      <div class="drawer-icon" id="drawerIcon">📦</div>
      <div class="drawer-title">
        <h3 id="drawerDesc">-</h3>
        <div class="item-no-big" id="drawerItemNo">-</div>
      </div>
    </div>
    <div class="detail-grid">
      <div class="detail-card">
        <div class="dc-label">Dept No.</div>
        <div class="dc-value" id="drawerDept">-</div>
      </div>
      <div class="detail-card">
        <div class="dc-label">Class</div>
        <div class="dc-value" id="drawerCls">-</div>
      </div>
      <div class="detail-card">
        <div class="dc-label">Item Status</div>
        <div class="dc-value" id="drawerStatus">-</div>
      </div>
      <div class="detail-card">
        <div class="dc-label">TYPE</div>
        <div class="dc-value" id="drawerType">-</div>
      </div>
    </div>
    <div class="detail-divider"></div>
    <div class="detail-card" style="grid-column:span 2">
      <div class="dc-label">SALES</div>
      <div class="dc-value" id="drawerSales">-</div>
    </div>
  </div>

const DEPT_CLASS_MAP = {};
PRODUCTS.forEach(p => {
  if (!DEPT_CLASS_MAP[p.dept]) DEPT_CLASS_MAP[p.dept] = new Set();
  DEPT_CLASS_MAP[p.dept].add(p.cls);
});
const ALL_CLASSES = [...new Set(PRODUCTS.map(p => p.cls))].sort((a,b)=>a-b);

function updateClassDropdown(selectedDept) {
  const sel = document.getElementById('classFilter');
  const prevVal = sel.value;
  sel.innerHTML = '<option value="">— ทุก Class —</option>';
  const classes = selectedDept
    ? [...DEPT_CLASS_MAP[selectedDept] || []].sort((a,b)=>a-b)
    : ALL_CLASSES;
  classes.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
  // restore previous value if still valid
  if ([...sel.options].some(o => o.value === prevVal)) sel.value = prevVal;
  else sel.value = '';
}

let filtered = [...PRODUCTS];
let currentPage = 1;
let perPage = 10;
let sortKey = null;
let sortDir = 1;

function applyFilters() {
  const dept = document.getElementById('deptFilter').value;
  const cls = document.getElementById('classFilter').value;
  const status = document.getElementById('statusFilter').value;
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  // Update class dropdown whenever dept changes
  updateClassDropdown(dept ? parseInt(dept) : '');

  filtered = PRODUCTS.filter(p => {
    if (dept && String(p.dept) !== dept) return false;
    if (cls && String(p.cls) !== cls) return false;
    if (status && p.status !== status) return false;
    if (q && !p.desc.toLowerCase().includes(q) && !String(p.itemNo).includes(q)) return false;
    return true;
  });

  if (sortKey) {
    filtered.sort((a,b) => {
      const av = a[sortKey], bv = b[sortKey];
      return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
    });
  }

  currentPage = 1;
  render();
}

function clearFilters() {
  document.getElementById('deptFilter').value = '';
  document.getElementById('classFilter').value = '';
  document.getElementById('statusFilter').value = '';
  document.getElementById('searchInput').value = '';
  updateClassDropdown('');
  applyFilters();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  ['itemNo','desc','status','type'].forEach(k => {
    const el = document.getElementById('sort-'+k);
    if (el) { el.textContent = '↕'; el.style.opacity = '.4'; }
  });
  const el = document.getElementById('sort-'+key);
  if (el) { el.textContent = sortDir === 1 ? '↑' : '↓'; el.style.opacity = '1'; }
  applyFilters();
}

function changePerPage(v) { perPage = parseInt(v); currentPage = 1; render(); }

function statusTag(s) {
  return s === 'Active'
    ? `<span class="tag tag-active">✅ Active</span>`
    : `<span class="tag tag-disc">⛔ Discontinued</span>`;
}
function typeTag(t) {
  return t === 'Pack Item'
    ? `<span class="tag tag-pack">📦 Pack Item</span>`
    : `<span class="tag tag-comp">🔩 Component Item</span>`;
}
function salesTag(s) {
  return s === 'AVG SALE'
    ? `<span class="tag tag-avgsale">📈 AVG SALE</span>`
    : `<span class="tag tag-zero">0</span>`;
}

function render() {
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage-1)*perPage;
  const end = Math.min(start+perPage, total);
  const items = filtered.slice(start, end);

  document.getElementById('resultCount').textContent = total.toLocaleString() + ' รายการ';

  const tbody = document.getElementById('tableBody');
  const emptyState = document.getElementById('emptyState');
  const cardList = document.getElementById('cardList');

  if (total === 0) {
    tbody.innerHTML = '';
    emptyState.style.display = 'block';
    cardList.innerHTML = '';
    document.getElementById('pageInfo').textContent = 'ไม่พบรายการ';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  emptyState.style.display = 'none';

  tbody.innerHTML = items.map((p, i) => `
    <tr>
      <td style="color:var(--text3);font-size:12px">${start+i+1}</td>
      <td><span class="item-no">${p.itemNo}</span></td>
      <td class="desc-cell">${p.desc}</td>
      <td class="col-status">${statusTag(p.status)}</td>
      <td class="col-type">${typeTag(p.type)}</td>
      <td><button class="detail-pill" onclick="openDrawer(${JSON.stringify(p).replace(/"/g,'&quot;')})">🔍 ดูรายละเอียด</button></td>
    </tr>
  `).join('');

  cardList.innerHTML = items.map(p => `
    <div class="product-card" onclick="openDrawer(${JSON.stringify(p).replace(/"/g,"'")})">
      <div class="card-body">
        <div class="card-item-no"># ${p.itemNo}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-tags">
          ${statusTag(p.status)}
          ${typeTag(p.type)}
        </div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  `).join('');

  document.getElementById('pageInfo').textContent = `แสดง ${start+1}–${end} จาก ${total.toLocaleString()} รายการ`;
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  const p = currentPage;
  let pages = [];
  if (totalPages <= 7) {
    for (let i=1; i<=totalPages; i++) pages.push(i);
  } else {
    pages = [1];
    if (p > 3) pages.push('...');
    for (let i=Math.max(2,p-1); i<=Math.min(totalPages-1,p+1); i++) pages.push(i);
    if (p < totalPages-2) pages.push('...');
    pages.push(totalPages);
  }
  el.innerHTML = `
    <button class="page-btn" onclick="goPage(${p-1})" ${p===1?'disabled':''}>‹</button>
    ${pages.map(pg => pg==='...'
      ? `<button class="page-btn dots">…</button>`
      : `<button class="page-btn ${pg===p?'active':''}" onclick="goPage(${pg})">${pg}</button>`
    ).join('')}
    <button class="page-btn" onclick="goPage(${p+1})" ${p===totalPages?'disabled':''}>›</button>
  `;
}

function goPage(n) {
  const tot = Math.ceil(filtered.length / perPage);
  if (n < 1 || n > tot) return;
  currentPage = n;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function openDrawer(p) {
  if (typeof p === 'string') p = JSON.parse(p.replace(/'/g, '"'));
  document.getElementById('drawerDesc').textContent = p.desc;
  document.getElementById('drawerItemNo').textContent = 'Item No: ' + p.itemNo;
  document.getElementById('drawerDept').textContent = p.dept;
  document.getElementById('drawerCls').textContent = p.cls;
  document.getElementById('drawerStatus').innerHTML = statusTag(p.status);
  document.getElementById('drawerType').innerHTML = typeTag(p.type);
  document.getElementById('drawerSales').innerHTML = salesTag(p.sales);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer(e) {
  if (e.target === document.getElementById('overlay')) closeDrawerBtn();
}
function closeDrawerBtn() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawerBtn(); });

function exportCSV() {
  const headers = ['Item No','Description','Dept','Class','Item Status','TYPE','SALES'];
  const rows = filtered.map(p => [p.itemNo, p.desc, p.dept, p.cls, p.status, p.type, p.sales]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'products.csv'; a.click();
  URL.revokeObjectURL(url);
}

// Init
applyFilters();
</script>
</body>
